<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="100%" height="100%" style="background:#13161f; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;">
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d6eea" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a2e6b" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Subtle circular highlights -->
  <circle cx="300" cy="80" r="120" fill="#1d6eea" opacity="0.05" filter="blur(40px)" />

  <!-- Technical drawing borders -->
  <rect x="15" y="15" width="370" height="210" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" rx="4"/>
  
  <!-- Decorative Technical elements -->
  <line x1="15" y1="45" x2="385" y2="45" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="280" y1="15" x2="280" y2="45" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Header Text -->
  <text x="30" y="34" fill="#e2e8f0" font-size="12" font-weight="700" letter-spacing="1">TECHNICAL DATA SHEET</text>
  <text x="292" y="33" fill="#1d6eea" font-size="10" font-weight="600" letter-spacing="0.5">SECURE DATA</text>

  <!-- Central Graphic (Corporate representation of an Excel/Data sheet) -->
  <g transform="translate(40, 70)">
    <!-- Document Backdrop -->
    <rect width="140" height="110" rx="6" fill="url(#blueGrad)" stroke="rgba(29, 110, 234, 0.4)" stroke-width="1.5" />
    
    <!-- Table Mock lines -->
    <rect x="12" y="15" width="116" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="12" y="38" width="50" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="70" y="38" width="58" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="12" y="54" width="70" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="90" y="54" width="38" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="12" y="70" width="40" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="60" y="70" width="68" height="8" rx="2" fill="rgba(255,255,255,0.08)"/>
    
    <!-- Graphic accent -->
    <circle cx="120" cy="94" r="8" fill="#1d6eea"/>
    <path d="M 117 94 L 123 94 M 120 91 L 120 97" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- Right Information Block -->
  <g transform="translate(200, 75)">
    <!-- Grid metadata representation -->
    <text x="0" y="15" fill="#8892a4" font-size="11" font-weight="600">FORMAT:</text>
    <text x="75" y="15" fill="#e2e8f0" font-size="11" font-weight="500" font-family="monospace">XLSX (Excel)</text>
    
    <text x="0" y="35" fill="#8892a4" font-size="11" font-weight="600">ENCRYPTION:</text>
    <text x="75" y="35" fill="#22c55e" font-size="11" font-weight="600">AES-256 SSL</text>

    <text x="0" y="55" fill="#8892a4" font-size="11" font-weight="600">INTEGRITY:</text>
    <text x="75" y="55" fill="#e2e8f0" font-size="11" font-weight="500">VERIFIED</text>

    <!-- Tiny chart visual -->
    <path d="M 0 100 L 40 85 L 80 95 L 120 75 L 160 85" fill="none" stroke="rgba(29, 110, 234, 0.4)" stroke-width="2"/>
    <path d="M 0 100 L 40 85 L 80 95 L 120 75 L 160 85 L 160 115 L 0 115 Z" fill="rgba(29, 110, 234, 0.05)"/>
    <circle cx="120" cy="75" r="3" fill="#1d6eea"/>
  </g>
  
  <!-- Subtle Technical Markings -->
  <rect x="360" y="195" fill="rgba(255,255,255,0.05)" width="15" height="15" rx="2"/>
  <text x="364" y="206" fill="#8892a4" font-size="8" font-family="monospace">QS</text>
</svg>
